name: Feature request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that MeshView does not support yet?
      placeholder: I want to measure the distance between two points on the model.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MeshView to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds.

  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: Viewer controls (orbit / pan / zoom)
        - label: STL parsing (binary / ASCII)
        - label: Toolbar or stats overlay
        - label: Settings or configuration
        - label: Other
